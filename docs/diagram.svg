<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" rx="14" fill="#f8fafc"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.4"/>
  </pattern>
  <rect width="1000" height="650" rx="14" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">Stellar Clock — Схема подключения</text>
  <text x="500" y="56" text-anchor="middle" fill="#64748b" font-size="12">ESP32-C3 SuperMini · OLED SSD1306 · BME280 · TP4056</text>
  <line x1="200" y1="66" x2="800" y2="66" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ========== WIRES (draw FIRST, behind cards) ========== -->

  <!-- Power 5V wire (red) -->
  <line x1="270" y1="247" x2="340" y2="247" stroke="#dc2626" stroke-width="2.5"/>
  <text x="295" y="240" fill="#dc2626" font-size="9" font-weight="bold">5V</text>

  <!-- Power GND wire (dark) -->
  <line x1="270" y1="267" x2="340" y2="267" stroke="#374151" stroke-width="2"/>

  <!-- LED wire (green): GPIO0 → up → left → down to LED card -->
  <line x1="340" y1="177" x2="310" y2="177" stroke="#10b981" stroke-width="2"/>
  <line x1="310" y1="177" x2="310" y2="95" stroke="#10b981" stroke-width="2"/>
  <line x1="310" y1="95" x2="160" y2="95" stroke="#10b981" stroke-width="2"/>
  <line x1="160" y1="95" x2="160" y2="110" stroke="#10b981" stroke-width="2"/>

  <!-- 3V3 wire (amber): ESP32 right → branch to OLED + BME -->
  <line x1="560" y1="270" x2="615" y2="270" stroke="#d97706" stroke-width="2"/>
  <line x1="615" y1="270" x2="615" y2="140" stroke="#d97706" stroke-width="2"/>
  <line x1="615" y1="140" x2="660" y2="140" stroke="#d97706" stroke-width="2"/>
  <line x1="615" y1="270" x2="615" y2="345" stroke="#d97706" stroke-width="2"/>
  <line x1="615" y1="345" x2="660" y2="345" stroke="#d97706" stroke-width="2"/>
  <text x="570" y="137" fill="#d97706" font-size="9" font-weight="bold">3V3</text>

  <!-- GND wire (dark): ESP32 right → branch to OLED + BME -->
  <line x1="560" y1="290" x2="625" y2="290" stroke="#374151" stroke-width="1.8"/>
  <line x1="625" y1="290" x2="625" y2="158" stroke="#374151" stroke-width="1.8"/>
  <line x1="625" y1="158" x2="660" y2="158" stroke="#374151" stroke-width="1.8"/>
  <line x1="625" y1="290" x2="625" y2="363" stroke="#374151" stroke-width="1.8"/>
  <line x1="625" y1="363" x2="660" y2="363" stroke="#374151" stroke-width="1.8"/>

  <!-- SDA wire (brown): ESP32 right → branch to OLED + BME -->
  <line x1="560" y1="200" x2="635" y2="200" stroke="#b45309" stroke-width="2.5"/>
  <line x1="635" y1="200" x2="635" y2="183" stroke="#b45309" stroke-width="2.5"/>
  <line x1="635" y1="183" x2="660" y2="183" stroke="#b45309" stroke-width="2.5"/>
  <line x1="635" y1="200" x2="635" y2="390" stroke="#b45309" stroke-width="2.5"/>
  <line x1="635" y1="390" x2="660" y2="390" stroke="#b45309" stroke-width="2.5"/>
  <text x="580" y="195" fill="#b45309" font-size="9" font-weight="bold">SDA</text>

  <!-- SCL wire (gray): ESP32 right → branch to OLED + BME -->
  <line x1="560" y1="225" x2="645" y2="225" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="645" y1="225" x2="645" y2="200" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="645" y1="200" x2="660" y2="200" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="645" y1="225" x2="645" y2="407" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="645" y1="407" x2="660" y2="407" stroke="#6b7280" stroke-width="2.5"/>
  <text x="580" y="220" fill="#6b7280" font-size="9" font-weight="bold">SCL</text>


  <!-- ========== ESP32-C3 (CENTER) ========== -->
  <rect x="340" y="110" width="220" height="300" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="340" y="110" width="220" height="34" rx="10" fill="#10b981"/>
  <rect x="340" y="130" width="220" height="14" fill="#10b981"/>
  <text x="450" y="133" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">ESP32-C3 SuperMini</text>

  <!-- USB-C -->
  <rect x="425" y="152" width="50" height="16" rx="4" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <text x="450" y="164" text-anchor="middle" fill="#374151" font-size="8">USB-C</text>

  <!-- Pin table — clean two columns -->
  <text x="352" y="192" fill="#374151" font-size="11" font-weight="bold">GPIO 0</text>
  <text x="428" y="192" fill="#6b7280" font-size="10">→ LED</text>

  <text x="352" y="215" fill="#374151" font-size="11" font-weight="bold">GPIO 8</text>
  <text x="428" y="215" fill="#6b7280" font-size="10">SDA</text>

  <text x="352" y="238" fill="#374151" font-size="11" font-weight="bold">GPIO 9</text>
  <text x="428" y="238" fill="#6b7280" font-size="10">SCL</text>

  <line x1="352" y1="250" x2="548" y2="250" stroke="#d1d5db" stroke-width="0.8"/>

  <text x="352" y="268" fill="#dc2626" font-size="11" font-weight="bold">5V</text>
  <text x="385" y="268" fill="#6b7280" font-size="10">от TP4056</text>

  <text x="352" y="288" fill="#d97706" font-size="11" font-weight="bold">3V3</text>
  <text x="392" y="288" fill="#6b7280" font-size="10">датчики</text>

  <text x="352" y="308" fill="#374151" font-size="11" font-weight="bold">GND</text>
  <text x="395" y="308" fill="#6b7280" font-size="10">земля</text>

  <line x1="352" y1="320" x2="548" y2="320" stroke="#d1d5db" stroke-width="0.8"/>

  <text x="352" y="340" fill="#6b7280" font-size="10">GPIO 10 → кнопка</text>
  <text x="352" y="360" fill="#6b7280" font-size="10">GPIO 21 → доп.</text>
  <text x="352" y="380" fill="#9ca3af" font-size="9">GPIO 2–7, 20 — свободны</text>

  <!-- Right side wire exit labels -->
  <text x="548" y="205" fill="#b45309" font-size="9" text-anchor="end">→ SDA</text>
  <text x="548" y="232" fill="#6b7280" font-size="9" text-anchor="end">→ SCL</text>
  <text x="548" y="272" fill="#d97706" font-size="9" text-anchor="end">→ 3V3</text>
  <text x="548" y="292" fill="#374151" font-size="9" text-anchor="end">→ GND</text>


  <!-- ========== SSD1306 OLED (TOP RIGHT) ========== -->
  <rect x="660" y="105" width="280" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="105" width="280" height="34" rx="10" fill="#3b82f6"/>
  <rect x="660" y="125" width="280" height="14" fill="#3b82f6"/>
  <text x="800" y="128" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">OLED SSD1306</text>

  <!-- Mini screen — with date + pressure -->
  <rect x="860" y="148" width="60" height="52" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="890" y="162" text-anchor="middle" fill="#22d3ee" font-size="9" font-family="monospace">14:32</text>
  <text x="890" y="174" text-anchor="middle" fill="#94a3b8" font-size="6" font-family="monospace">06.05.2026</text>
  <text x="890" y="185" text-anchor="middle" fill="#fbbf24" font-size="6" font-family="monospace">23°C  58%</text>
  <text x="890" y="195" text-anchor="middle" fill="#a78bfa" font-size="6" font-family="monospace">754 мм рт.ст</text>

  <text x="675" y="155" fill="#374151" font-size="11" font-weight="bold">VCC</text>
  <text x="710" y="155" fill="#6b7280" font-size="10">← 3V3</text>

  <text x="675" y="173" fill="#374151" font-size="11" font-weight="bold">GND</text>
  <text x="712" y="173" fill="#6b7280" font-size="10">← земля</text>

  <text x="675" y="191" fill="#374151" font-size="11" font-weight="bold">SDA</text>
  <text x="710" y="191" fill="#6b7280" font-size="10">← GPIO 8</text>

  <text x="675" y="209" fill="#374151" font-size="11" font-weight="bold">SCL</text>
  <text x="710" y="209" fill="#6b7280" font-size="10">← GPIO 9</text>

  <!-- Address badge -->
  <rect x="870" y="205" width="46" height="16" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="893" y="217" text-anchor="middle" fill="#1d4ed8" font-size="9" font-weight="bold">0x3C</text>


  <!-- ========== BME280 (MIDDLE RIGHT) ========== -->
  <rect x="660" y="300" width="280" height="130" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="300" width="280" height="34" rx="10" fill="#8b5cf6"/>
  <rect x="660" y="320" width="280" height="14" fill="#8b5cf6"/>
  <text x="800" y="323" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">BME280 / BMP280</text>

  <!-- Sensor chip -->
  <rect x="880" y="345" width="40" height="28" rx="3" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="900" y="363" text-anchor="middle" fill="#5b21b6" font-size="7" font-family="monospace">BME</text>

  <text x="675" y="358" fill="#374151" font-size="11" font-weight="bold">VCC</text>
  <text x="710" y="358" fill="#6b7280" font-size="10">← 3V3</text>

  <text x="675" y="376" fill="#374151" font-size="11" font-weight="bold">GND</text>
  <text x="712" y="376" fill="#6b7280" font-size="10">← земля</text>

  <text x="675" y="394" fill="#374151" font-size="11" font-weight="bold">SDA</text>
  <text x="710" y="394" fill="#6b7280" font-size="10">← GPIO 8</text>

  <text x="675" y="412" fill="#374151" font-size="11" font-weight="bold">SCL</text>
  <text x="710" y="412" fill="#6b7280" font-size="10">← GPIO 9</text>

  <!-- Single address badge -->
  <rect x="870" y="350" width="46" height="20" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="893" y="364" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="bold">0x76</text>

  <text x="870" y="385" fill="#9ca3af" font-size="8">SDO→VCC = 0x77</text>


  <!-- ========== POWER (LEFT, below LED) ========== -->
  <rect x="40" y="200" width="230" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="200" width="230" height="34" rx="10" fill="#ef4444"/>
  <rect x="40" y="220" width="230" height="14" fill="#ef4444"/>
  <text x="155" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">⚡ Питание</text>

  <!-- Battery -->
  <rect x="60" y="248" width="40" height="22" rx="4" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="100" y="253" width="5" height="12" rx="2" fill="#dc2626"/>
  <text x="112" y="264" fill="#374151" font-size="10">Li-Ion</text>

  <text x="75" y="290" fill="#6b7280" font-size="10">↓ TP4056 (USB-C)</text>
  <text x="75" y="306" fill="#6b7280" font-size="10">↓ Выключатель → 5V / GND</text>


  <!-- ========== LED (TOP LEFT) ========== -->
  <rect x="40" y="110" width="230" height="75" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="155" y="138" text-anchor="middle" fill="#374151" font-size="13" font-weight="bold">💡 Светодиод (маяк)</text>
  <text x="60" y="158" fill="#6b7280" font-size="10">GPIO 0 → R (220Ω) → LED → GND</text>
  <text x="60" y="174" fill="#9ca3af" font-size="9">Индикатор на GPIO 0</text>


  <!-- ========== NOTES (BOTTOM) ========== -->
  <rect x="40" y="470" width="900" height="100" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="494" fill="#92400e" font-size="12" font-weight="bold">📌 Примечания</text>
  <text x="60" y="514" fill="#374151" font-size="10">• I²C шина общая для OLED и BME280 — оба подключены к GPIO 8 (SDA) и GPIO 9 (SCL)</text>
  <text x="60" y="530" fill="#374151" font-size="10">• Адреса по умолчанию: OLED = 0x3C · BME280 = 0x76 (пин SDO → GND, иначе 0x77)</text>
  <text x="60" y="546" fill="#374151" font-size="10">• Резистор для LED: 220 Ом · Прошивка: PlatformIO → src/StellarClock_v5.ino</text>
</svg>